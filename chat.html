<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MeetChat</title>
</head>
<body>

    <h1>MeetChat</h1>

    <!-- Zone d'affichage des messages -->
    <div id="messages" style="border: 1px solid #ccc; height: 300px; overflow-y: scroll; margin-bottom: 10px; padding: 10px;">
        <!-- Les messages s'afficheront ici -->
    </div>

    <!-- Zone de saisie -->
    <input type="text" id="msg" placeholder="Tapez votre message...">
    <button id="send-btn">Envoyer</button>

    <!-- Chargement du script principal -->
    <script type="module" src="chat.js"></script>

</body>
</html>
